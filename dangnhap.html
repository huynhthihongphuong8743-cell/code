<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — SkillSwap</title>
  <link rel="stylesheet" href="SPCK.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
</header>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Đăng nhập</h2>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="login-email" value="demo@skillswap.vn" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Mật khẩu</label>
              <input type="password" class="form-control" id="login-pass" value="123456" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3">Đăng nhập</button>
          </form>
          <p class="text-center mt-3">Chưa có tài khoản? <a href="dangky.html">Đăng ký</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="SPCK.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;

  // Demo account
  if (email === 'demo@skillswap.vn') {
    const demoUser = {
      uid: 'u_demo',
      name: 'Nguyễn Văn A',
      email: 'demo@skillswap.vn',
      avatar: '👨‍🎓',
      xp: 450,
      level: 5
    };
    Auth.login(demoUser);
    showToast('Đăng nhập thành công!', 'success');
    setTimeout(() => window.location.href = 'skill.html', 800);
    return;
  }

  showToast('Tài khoản demo: demo@skillswap.vn / 123456', 'info');
});
</script>
</body>
</html>
