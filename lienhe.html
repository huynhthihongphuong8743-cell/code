<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ — SkillSwap</title>
  <link rel="stylesheet" href="SPCK.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar chung -->
<header style="background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
  <h2 style="margin:0; font-size:24px;">SkillSwap</h2>
  <nav>
    <a href="SPCK.html" style="color:white; margin:0 15px; text-decoration:none;">Trang chủ</a>
    <a href="khampha.html" style="color:white; margin:0 15px; text-decoration:none;">Khám phá</a>
    <a href="skill.html" style="color:white; margin:0 15px; text-decoration:none;">Kỹ năng của tôi</a>
    <a href="admin.html" style="color:white; margin:0 15px; text-decoration:none;">Admin</a>
  </nav>
</header>
<div class="container py-5">
  <h1 class="text-center mb-5">Liên hệ với chúng tôi</h1>
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-body p-5">
          <form>
            <div class="mb-3"><input type="text" class="form-control" placeholder="Họ tên" required></div>
            <div class="mb-3"><input type="email" class="form-control" placeholder="Email" required></div>
            <div class="mb-3"><textarea class="form-control" rows="5" placeholder="Nội dung tin nhắn"></textarea></div>
            <button type="button" class="btn btn-primary w-100" onclick="showToast('✅ Tin nhắn đã được gửi!', 'success')">Gửi tin nhắn</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="SPCK.js"></script>
</body>
</html>
