<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — SkillSwap</title>
  <link rel="stylesheet" href="SPCK.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <h1 class="mb-4">🔧 Admin Panel</h1>

  <!-- Login -->
  <div id="login-panel">
    <div class="card mx-auto" style="max-width:400px">
      <div class="card-body p-5">
        <h4 class="text-center">Đăng nhập Admin</h4>
        <input type="email" id="admin-email" class="form-control mb-3" value="admin@skillswap.vn" placeholder="Email">
        <input type="password" id="admin-pass" class="form-control mb-4" value="admin2026" placeholder="Mật khẩu">
        <button class="btn btn-danger w-100" onclick="adminLogin()">Đăng nhập</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-panel" style="display:none;">
    <button class="btn btn-outline-danger mb-4" onclick="adminLogout()">Đăng xuất</button>
    
    <h3>Kỹ năng chờ duyệt</h3>
    <div class="table-responsive">
      <table class="table table-hover" id="admin-table">
        <thead><tr><th>Tiêu đề</th><th>Tác giả</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="SPCK.js"></script>
<script>
  function adminLogin() {
    if (document.getElementById('admin-email').value === 'admin@skillswap.vn' && 
        document.getElementById('admin-pass').value === 'admin2026') {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadPendingSkills();
    } else {
      showToast('Sai thông tin admin!', 'error');
    }
  }

  function adminLogout() {
    document.getElementById('login-panel').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
  }

  function loadPendingSkills() {
    const skills = DB.getAll('skill_').filter(s => s.status === 'pending' || !s.status);
    let html = '';
    skills.forEach(s => {
      html += `<tr>
        <td>${s.title}</td>
        <td>${s.authorName}</td>
        <td>Chờ duyệt</td>
        <td>
          <button class="btn btn-success btn-sm me-2" onclick="approveSkill('${s.id}')">Duyệt</button>
          <button class="btn btn-warning btn-sm" onclick="rejectSkill('${s.id}')">Từ chối</button>
        </td>
      </tr>`;
    });
    document.getElementById('admin-tbody').innerHTML = html || '<tr><td colspan="4" class="text-center">Không có kỹ năng chờ duyệt</td></tr>';
  }

  function approveSkill(id) {
    const skill = DB.get('skill_' + id);
    skill.status = 'approved';
    DB.set('skill_' + id, skill);
    showToast('Đã duyệt kỹ năng!', 'success');
    loadPendingSkills();
  }

  function rejectSkill(id) {
    const skill = DB.get('skill_' + id);
    skill.status = 'rejected';
    DB.set('skill_' + id, skill);
    showToast('Đã từ chối kỹ năng', 'warn');
    loadPendingSkills();
  }
</script>
</body>
</html>
