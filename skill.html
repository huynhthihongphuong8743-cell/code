<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kỹ năng của tôi — SkillSwap</title>
  <link rel="stylesheet" href="SPCK.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: var(--c-navy) !important; color: var(--c-text) !important; }
    .stat-mini { background: var(--c-glass); border: 1px solid var(--c-border); border-radius: 12px; padding: 20px; text-align: center; }
    .skill-row-thumb { width: 45px; height: 45px; font-size: 24px; background: var(--c-navy3); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
    <!-- Navbar chung -->
<header style="background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
  <h2 style="margin:0; font-size:24px;">SkillSwap</h2>
  <nav>
    <a href="SPCK.html" style="color:white; margin:0 15px; text-decoration:none;">Trang chủ</a>
    <a href="khampha.html" style="color:white; margin:0 15px; text-decoration:none;">Khám phá</a>
    <a href="skill.html" style="color:white; margin:0 15px; text-decoration:none;">Kỹ năng của tôi</a>
    <a href="admin.html" style="color:white; margin:0 15px; text-decoration:none;">Admin</a>
  </nav>
</header>
<div class="container py-5">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="mb-0">Kỹ năng của tôi</h1>
    <button class="btn btn-primary" onclick="requireAuthThen(openPostModal)">
      <i class="bi bi-plus-lg me-2"></i>Đăng kỹ năng mới
    </button>
  </div>

  <!-- Auth Gate -->
  <div id="auth-gate" style="display:none;" class="text-center py-5">
    <h3>Bạn chưa đăng nhập</h3>
    <a href="dangnhap.html?redirect=skill.html" class="btn btn-primary">Đăng nhập ngay</a>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="stat-mini"><h3 id="stat-total">0</h3><p>Tổng kỹ năng</p></div></div>
      <div class="col-6 col-md-3"><div class="stat-mini"><h3 id="stat-approved" style="color:#10d9a0">0</h3><p>Đã duyệt</p></div></div>
      <div class="col-6 col-md-3"><div class="stat-mini"><h3 id="stat-pending" style="color:#fbbf24">0</h3><p>Chờ duyệt</p></div></div>
      <div class="col-6 col-md-3"><div class="stat-mini"><h3 id="stat-xp" style="color:#0dcaf0">0</h3><p>XP</p></div></div>
    </div>

    <div class="card bs-card">
      <div class="table-responsive">
        <table class="table table-hover" id="skills-table">
          <thead><tr>
            <th>Emoji</th>
            <th>Tên kỹ năng</th>
            <th>Danh mục</th>
            <th>Trạng thái</th>
            <th>Ngày</th>
            <th>Hành động</th>
          </tr></thead>
          <tbody id="skills-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Đăng / Sửa -->
<div class="modal fade" id="postModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Đăng kỹ năng mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="row g-3">
          <div class="col-12"><input type="text" id="p-title" class="form-control" placeholder="Tên kỹ năng" required></div>
          <div class="col-md-6">
            <select id="p-category" class="form-select">
              <option value="">Chọn danh mục</option>
              <option>Lập trình</option><option>Thiết kế</option><option>Ngoại ngữ</option>
              <option>Âm nhạc</option><option>Kinh doanh</option><option>Khác</option>
            </select>
          </div>
          <div class="col-md-6"><input type="text" id="p-emoji" class="form-control" value="📚" placeholder="Emoji"></div>
          <div class="col-12"><textarea id="p-desc" class="form-control" rows="4" placeholder="Mô tả kỹ năng..."></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary" onclick="submitSkill()">Gửi duyệt</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="SPCK.js"></script>
<script>
  let bsModal;
  window.onload = () => {
    bsModal = new bootstrap.Modal(document.getElementById('postModal'));
    if (!Auth.currentUser) {
      document.getElementById('auth-gate').style.display = 'block';
      document.getElementById('main-content').style.display = 'none';
    } else {
      loadStats();
      loadMySkills();
    }
  };

  function requireAuthThen(fn) {
    if (!Auth.currentUser) return location.href = 'dangnhap.html?redirect=skill.html';
    fn();
  }

  function loadStats() {
    const uid = Auth.currentUser.uid;
    const skills = DB.getAll('skill_').filter(s => s.authorId === uid);
    document.getElementById('stat-total').textContent = skills.length;
    document.getElementById('stat-approved').textContent = skills.filter(s => s.status === 'approved').length;
    document.getElementById('stat-pending').textContent = skills.filter(s => !s.status || s.status === 'pending').length;
    document.getElementById('stat-xp').textContent = Auth.currentUser.xp || 0;
  }

  function loadMySkills() {
    const uid = Auth.currentUser.uid;
    const skills = DB.getAll('skill_').filter(s => s.authorId === uid)
      .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    let html = '';
    skills.forEach(s => {
      const status = s.status === 'approved' ? '✅ Đã duyệt' : s.status === 'rejected' ? '❌ Từ chối' : '⏳ Chờ duyệt';
      html += `<tr>
        <td>${s.emoji || '📚'}</td>
        <td><strong>${s.title}</strong></td>
        <td>${s.category}</td>
        <td>${status}</td>
        <td>${new Date(s.createdAt).toLocaleDateString('vi-VN')}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick="editSkill('${s.id}')">Sửa</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSkill('${s.id}')">Xóa</button>
        </td>
      </tr>`;
    });
    document.getElementById('skills-tbody').innerHTML = html || '<tr><td colspan="6" class="text-center py-4">Chưa có kỹ năng nào</td></tr>';
  }

  function openPostModal() {
    document.getElementById('edit-id').value = '';
    document.getElementById('modal-title').textContent = 'Đăng kỹ năng mới';
    document.getElementById('p-title').value = '';
    document.getElementById('p-desc').value = '';
    bsModal.show();
  }

  function editSkill(id) {
    const skill = DB.get('skill_' + id);
    if (!skill) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('modal-title').textContent = 'Chỉnh sửa kỹ năng';
    document.getElementById('p-title').value = skill.title;
    document.getElementById('p-category').value = skill.category;
    document.getElementById('p-emoji').value = skill.emoji || '📚';
    document.getElementById('p-desc').value = skill.desc;
    bsModal.show();
  }

  function submitSkill() {
    const id = document.getElementById('edit-id').value;
    const title = document.getElementById('p-title').value.trim();
    const category = document.getElementById('p-category').value;
    const emoji = document.getElementById('p-emoji').value || '📚';
    const desc = document.getElementById('p-desc').value.trim();

    if (!title || !category || !desc) {
      showToast('Vui lòng điền đầy đủ thông tin', 'error');
      return;
    }

    if (id) {
      // Edit
      const skill = DB.get('skill_' + id);
      Object.assign(skill, {title, category, emoji, desc, status: 'pending', updatedAt: new Date().toISOString()});
      DB.set('skill_' + id, skill);
      showToast('Đã cập nhật kỹ năng!', 'success');
    } else {
      // New
      const newId = 's_' + Date.now();
      DB.set('skill_' + newId, {
        id: newId,
        title, category, emoji, desc,
        authorId: Auth.currentUser.uid,
        authorName: Auth.currentUser.name,
        status: 'pending',
        createdAt: new Date().toISOString()
      });
      Auth.currentUser.xp = (Auth.currentUser.xp || 0) + 50;
      DB.set('user_' + Auth.currentUser.uid, Auth.currentUser);
      showToast('✅ Đăng kỹ năng thành công! (+50 XP)', 'success');
    }

    bsModal.hide();
    loadMySkills();
    loadStats();
  }

  function deleteSkill(id) {
    if (confirm('Xóa kỹ năng này?')) {
      DB.remove('skill_' + id);
      loadMySkills();
      loadStats();
      showToast('Đã xóa kỹ năng', 'info');
    }
  }
</script>
</body>
</html>
