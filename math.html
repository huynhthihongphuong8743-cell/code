<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toán Học - SkillSwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="SPCK.css">
</head>
<body>
  <!-- Navbar sẽ được copy từ trang chủ sau -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="SPCK.html">SkillSwap</a>
      <a href="SPCK.html" class="btn btn-light">← Về Trang chủ</a>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="text-center mb-5">📐 Danh mục Toán Học</h1>
    <div class="row g-4" id="math-grid">
      <!-- JS sẽ load kỹ năng Toán -->
    </div>
  </div>

  <script src="SPCK.js"></script>
  <script>
    // Load kỹ năng thuộc danh mục Toán
    function loadMathSkills() {
      const skills = DB.getAll('skill_').filter(s => s.category === "Toán" || s.category === "Toán Học");
      const container = document.getElementById('math-grid');
      container.innerHTML = skills.length ? skills.map(s => `
        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-body text-center">
              <h3>${s.emoji || '📐'} ${s.title}</h3>
              <p>${s.desc.substring(0, 100)}...</p>
            </div>
          </div>
        </div>`).join('') : '<p class="text-center">Chưa có kỹ năng Toán nào!.</p>';
    }
    window.onload = loadMathSkills;
  </script>
</body>
</html>
