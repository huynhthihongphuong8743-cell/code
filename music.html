<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Âm Nhạc - SkillSwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="SPCK.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: linear-gradient(135deg, #4f46e5, #7c3aed);">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">SkillSwap</a>
      <a href="index.html" class="btn btn-light">← Về Trang chủ</a>
    </div>
  </nav>

  <div style="height: 80px;"></div>

  <div class="container py-5">
    <h1 class="text-center mb-5">🎵 Danh mục Âm Nhạc</h1>
    <div class="row g-4" id="music-grid"></div>
  </div>

  <script src="SPCK.js"></script>
  <script>
    function loadMusicSkills() {
      const skills = DB.getAll('skill_').filter(s => 
        s.category === "Âm nhạc" || 
        s.category === "Âm Nhạc" || 
        s.category === "Music" ||
        (s.tags && s.tags.some(t => t.toLowerCase().includes("nhạc")))
      );

      const container = document.getElementById('music-grid');
      
      container.innerHTML = skills.length ? skills.map(s => `
        <div class="col-md-4 col-lg-3">
          <div class="card h-100 shadow-sm">
            <div class="card-body text-center">
              <div style="font-size: 60px; margin-bottom: 15px;">${s.emoji || '🎵'}</div>
              <h5 class="card-title">${s.title}</h5>
              <span class="badge bg-info">${s.category}</span>
              <p class="card-text text-muted mt-3 small">${s.desc ? s.desc.substring(0, 90) + '...' : 'Không có mô tả'}</p>
            </div>
          </div>
        </div>
      `).join('') : `
        <div class="col-12 text-center py-5">
          <h3>🎵 Chưa có kỹ năng Âm Nhạc nào</h3>
          <p class="text-muted">Bạn có thể đăng kỹ năng mới trong phần "Kỹ năng của tôi"</p>
        </div>`;
    }

    // Tự động load khi mở trang web
    window.onload = loadMusicSkills;
  </script>
</body>
</html>
